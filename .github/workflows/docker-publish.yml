name: Build and Push Docker Image

on:
  push:
    branches:
      - ethstats-client  # This triggers the workflow on a push to the 'ethstats-client' branch
  pull_request:
    branches:
      - ethstats-client  # Also triggers on pull requests to the 'ethstats-client' branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # Step 2: Get current commit SHA
      - name: Get current commit SHA
        id: current_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_ENV

      # Step 3: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Log in to DockerHub using the secrets
      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_SERVICE_ACCOUNT_PAT }}" | docker login --username "${{ vars.DOCKERHUB_USERNAME }}" --password ${{ secrets.DOCKERHUB_SERVICE_ACCOUNT_PAT }}

      # Step 5: Build the Docker image
      - name: Build Docker image
        run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/moksha-stats-dashboard:latest .

      # Step 6: Push the Docker image to DockerHub
      - name: Push Docker image
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/moksha-stats-dashboard:latest
